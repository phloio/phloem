site_name: Phloem
site_description: An operator-and-agent-fleet coordination substrate over NATS.
site_url: https://phloio.github.io/phloem/

repo_name: phloio/phloem
repo_url: https://github.com/phloio/phloem

theme:
  name: material
  palette:
    primary: green
    accent: light green
  features:
    - navigation.instant
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - content.code.copy

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Configure: configure.md
  - Extend: extend.md
  - Operate:
      - Relay setup: relay-setup.md
  - Design:
      - Overview: design/index.md
      - Architecture: design/architecture.md
      - Decisions:
          - Index: design/decisions/index.md
          - 0001 — Message bus: design/decisions/0001-message-bus.md
          - 0002 — Inversion of control: design/decisions/0002-inversion-of-control.md
          - 0003 — LLM provider abstraction: design/decisions/0003-llm-provider-abstraction.md
          - 0004 — Pluggable knowledge bases: design/decisions/0004-pluggable-knowledge-bases.md
          - 0005 — Config-driven roles: design/decisions/0005-config-driven-roles.md
          - 0006 — Python everywhere: design/decisions/0006-python-everywhere.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - tables

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            docstring_style: google
